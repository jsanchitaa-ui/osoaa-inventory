services:
  postgres:
    image: postgres:16

    container_name: osoaa-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: osoaa123
      POSTGRES_DB: osoaa_inventory

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: